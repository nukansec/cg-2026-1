<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Computação Gráfica - Tarefa 2: Linhas e Círculos Aleatórios</title>
    <style>
        body {
            background-color: #333; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #Canvas {
            background-color: black;
            border: 2px solid #555; /* borda que define os limites */
        }
    </style>
</head>
<body>

    <canvas id="Canvas" width="800" height="800"></canvas>

    <script>
        const canvas = document.getElementById('Canvas');
        const contexto = canvas.getContext('2d');

        let permitidoDesenhar = true;

        contexto.fillStyle = "black";
        contexto.fillRect(0, 0, canvas.width, canvas.height);

        function putPixel(x, y, cor) {
            contexto.fillStyle = cor;
            contexto.fillRect(x, y, 5, 5); /* desenha um quadrado 5x5, pois 1x1 criavam linhas e circulos muito finos */
        }

        function sortearNumero(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min; /* sorteia um número inteiro entre min e max */
        }

        function sortearCor() {
            const vermelho = sortearNumero(0, 255);
            const verde = sortearNumero(0, 255);
            const azul = sortearNumero(0, 255);
            return `rgb(${vermelho}, ${verde}, ${azul})`;
        }

        function linhaDDA(x1, y1, x2, y2, cor) {
            let dx = x2 - x1;
            let dy = y2 - y1;

            let passos;
            if (Math.abs(dx) > Math.abs(dy)) {
                passos = Math.abs(dx);
            } else {
                passos = Math.abs(dy);
            }

            /* quanto o x e o y crescem a cada passo */
            let incrementoX = dx / passos;
            let incrementoY = dy / passos;

            let x = x1;
            let y = y1;

            putPixel(Math.round(x), Math.round(y), cor);

            for (let i = 1; i <= passos; i++) {
                x = x + incrementoX; /* anda em X */
                y = y + incrementoY; /* anda em Y */
                
                putPixel(Math.round(x), Math.round(y), cor);
            }
        }

        /* função para criar 8 pontos simétricos */
        function simetriaBresenham(xc, yc, x, y, cor) {
            putPixel(xc + x, yc + y, cor);
            putPixel(xc - x, yc + y, cor);
            putPixel(xc + x, yc - y, cor);
            putPixel(xc - x, yc - y, cor);
            putPixel(xc + y, yc + x, cor);
            putPixel(xc - y, yc + x, cor);
            putPixel(xc + y, yc - x, cor);
            putPixel(xc - y, yc - x, cor);
        }

        function circuloBresenham(xc, yc, raio, cor) {
            let x = 0;
            let y = raio;
            let d = 3 - 2 * raio;

            simetriaBresenham(xc, yc, x, y, cor);

            /* laço para desenhar o círculo usando a lógica de Bresenham */
            while (x < y) {
                if (d < 0) {
                    d = d + 4 * x + 6;
                } else {
                    d = d + 4 * (x - y) + 10;
                    y -= 1;
                }
                x += 1;
                simetriaBresenham(xc, yc, x, y, cor);
            }

        }

        function desenharLinhasECirculosAleatorios() {
            if (permitidoDesenhar === false) {
                return;
            }

            let tipo = sortearNumero(1, 2); /* 1 para linha, 2 para círculo */
            let cor = sortearCor();

            if (tipo === 1) {
                let x1 = sortearNumero(0, canvas.width);
                let y1 = sortearNumero(0, canvas.height);
                let x2 = sortearNumero(0, canvas.width);
                let y2 = sortearNumero(0, canvas.height);
                linhaDDA(x1, y1, x2, y2, cor);
            } else {
                let xc = sortearNumero(0, canvas.width);
                let yc = sortearNumero(0, canvas.height);
                let raio = sortearNumero(10, 100); /* raio entre 10 e 100 */
                circuloBresenham(xc, yc, raio, cor);
            }

            setTimeout(desenharLinhasECirculosAleatorios, 500); /* para desenhar mais devagar */
        }

        document.addEventListener('keydown', function (evento) { /* botão ESC para encerrar o programa */
            if (evento.key.toLowerCase() === 'escape') {
                permitidoDesenhar = false;

                contexto.fillStyle = "white";
                contexto.font = "40px Arial";
                contexto.textAlign = "center";
                contexto.textBaseline = "middle";
                contexto.fillText("Fim do programa", canvas.width / 2, canvas.height / 2);

                return;
            }
        });

        desenharLinhasECirculosAleatorios();

    </script>
</body>
</html>
